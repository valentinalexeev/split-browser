name: Build skill package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package split-browser.skill
        run: |
          mkdir -p build/split-browser
          cp SKILL.md build/split-browser/
          cp -r references build/split-browser/
          cd build
          zip -r ../split-browser.skill split-browser

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest split-browser.skill \
            --title "Latest build" \
            --notes "Auto-built from commit ${GITHUB_SHA}." \
            --latest
